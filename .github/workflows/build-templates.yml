---
name: build-templates

# Matrix legs come from ci/matrix.json (single source of truth for OS
# lines). base_name values embed the '-main' branch suffix because builds
# only run from main.
# (the dispatch 'options' list below must be kept in sync by hand — GitHub cannot populate choice inputs dynamically).
on:
  schedule:
    # Weekly rebuild, Saturday 02:00 UTC — all enabled lines (the plan job
    # defaults to 'all' when there is no dispatch input).
    #
    # Two GitHub scheduler caveats (neither is an approval gate):
    #   - Cron is best-effort and is frequently delayed under load — observed
    #     starts run hours after 02:00. Don't rely on the exact minute.
    #   - GitHub auto-disables scheduled workflows after ~60 days with no
    #     repository activity; re-enable from the Actions tab if it happens.
    #     The Monday check-iso-updates commit to main normally keeps the repo
    #     active enough to avoid this.
    - cron: "0 2 * * 6"
  workflow_dispatch:
    inputs:
      os:
        description: "OS line to build (key from ci/matrix.json)"
        type: choice
        default: all
        options:
          - all
          - ubuntu-2404
          - ubuntu-2204
          - debian-12
          - debian-13
          - rocky-9
          - almalinux-9
          - windows-server-2025
          - windows-server-2022
          - windows-desktop-11

permissions:
  contents: read

# Date-stamp-free engine naming means two concurrent RUNS would race to
# create the same VM name — serialize runs. Legs within one run build
# different names, so the matrix itself may parallelize.
concurrency:
  group: build-templates
  cancel-in-progress: false

# Cancellation note: -on-error=cleanup covers packer-detected failures but
# NOT workflow cancellation (SIGTERM) — a cancelled run can leave a
# '<base>-build' VM behind. The next run's -force (build.sh) deletes the
# same-named VM at build start; manual govc cleanup also works.

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Select matrix legs
        id: plan
        env:
          SELECTED: ${{ github.event.inputs.os || 'all' }}
        run: |
          set -euo pipefail
          matrix="$(jq -c --arg sel "$SELECTED" \
            '[ .[] | select((($sel == "all") and .enabled) or ($sel == .key)) ]' \
            ci/matrix.json)"
          test "$(jq 'length' <<<"$matrix")" -gt 0
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    needs: plan
    runs-on: packer-vsphere
    timeout-minutes: ${{ matrix.timeout_minutes || 150 }}
    strategy:
      fail-fast: false
      # Scale set maxRunners is 3 — leave one slot free for ad-hoc jobs.
      max-parallel: 2
      matrix:
        include: ${{ fromJson(needs.plan.outputs.matrix) }}
    name: build (${{ matrix.key }})
    env:
      PACKER_LOG: "1"
      PACKER_LOG_PATH: ${{ github.workspace }}/packer-build.log
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Ansible's WinRM connection plugin imports pywinrm on the control node
      # (this runner) using ansible's OWN interpreter. If it's missing, the build
      # fails ~7 min into provisioning with a cryptic "No module named 'winrm'"
      # (Linux uses SSH — unaffected). Assert it up front, via the same interpreter
      # ansible runs under (its console-script shebang — the mise/pipx install dir
      # has no sibling python), so a bad runner image fails in seconds with a clear
      # message instead of deep in a Packer/Ansible trace. Mirrors the install in
      # runner/Dockerfile; see docs/docs/operations/windows.md.
      - name: Preflight WinRM control-node deps (Windows only)
        if: matrix.os == 'Windows'
        run: |
          set -euo pipefail
          py="$(sed -n '1s/^#!//p' "$(mise which ansible)")"
          if ! "${py}" -c "import winrm" 2>/dev/null; then
            echo "::error::pywinrm not importable by ansible (${py}). The packer-runner image is missing the Windows control-node dependency — rebuild it (runner/Dockerfile) and bump the digest in talos-cluster." >&2
            exit 1
          fi
          echo "pywinrm OK (${py})"

      - name: Build ${{ matrix.dist }} ${{ matrix.version }}
        env:
          BUILD_OS: ${{ matrix.os }}
          BUILD_DIST: ${{ matrix.dist }}
          BUILD_VERSION: ${{ matrix.version }}
          BUILD_EDITION: ${{ matrix.edition }}
          BUILD_ONLY: ${{ matrix.only }}
        run: |
          set -euo pipefail
          args=( --ci --os "$BUILD_OS" --dist "$BUILD_DIST" --version "$BUILD_VERSION" )
          if [ -n "${BUILD_EDITION:-}" ]; then
            args+=( --edition "$BUILD_EDITION" )
          fi
          if [ -n "${BUILD_ONLY:-}" ]; then
            args+=( --only "$BUILD_ONLY" )
          fi
          ./build.sh "${args[@]}" "$GITHUB_WORKSPACE/ci/config"

      # Swap the freshly converted '<base>-build' template into the stable
      # name Terraform clones (<base>), keeping exactly one rollback
      # generation (<base>-prev). Success-only: a failed build can never
      # touch the stable template. Each rename is conditional on what
      # exists, so a crash mid-swap self-heals on the next successful run.
      - name: Promote template (-prev swap)
        env:
          BASE_NAME: ${{ matrix.base_name }}
        run: |
          set -euo pipefail
          export GOVC_URL="https://${PKR_VAR_vsphere_endpoint}"
          export GOVC_USERNAME="${PKR_VAR_vsphere_username}"
          export GOVC_PASSWORD="${PKR_VAR_vsphere_password}"
          export GOVC_INSECURE="${PKR_VAR_vsphere_insecure_connection:-true}"
          export GOVC_DATACENTER="${PKR_VAR_vsphere_datacenter}"
          folder="/${PKR_VAR_vsphere_datacenter}/vm/${PKR_VAR_vsphere_folder}"
          govc version
          # Guard before mutating anything: if the freshly built template is
          # missing, fail cleanly with the stable <base> still in place.
          # (govc ls on a missing path prints nothing and exits 0 — the
          # emptiness checks below are load-bearing.)
          if [ -z "$(govc ls "${folder}/${BASE_NAME}-build")" ]; then
            echo "ERROR: ${BASE_NAME}-build not found — nothing to promote" >&2
            exit 1
          fi
          # First run for a new OS line: neither <base> nor <base>-prev
          # exists yet; both conditionals no-op and the rename below is all
          # that happens.
          if [ -n "$(govc ls "${folder}/${BASE_NAME}-prev")" ]; then
            govc vm.destroy "${folder}/${BASE_NAME}-prev"
          fi
          if [ -n "$(govc ls "${folder}/${BASE_NAME}")" ]; then
            govc object.rename "${folder}/${BASE_NAME}" "${BASE_NAME}-prev"
          fi
          govc object.rename "${folder}/${BASE_NAME}-build" "${BASE_NAME}"
          govc vm.info "${folder}/${BASE_NAME}"

      # upload-artifact v4 rejects ':' in file paths, and the engine names
      # manifests with a 'YYYY-MM-DD hh:mm:ss' timestamp — rename first.
      - name: Rename manifests for artifact upload
        if: always()
        run: |
          set -euo pipefail
          for f in manifests/*.json; do
            [ -e "$f" ] || continue
            mv "$f" "${f//[ :]/-}"
          done

      # Manifests contain only non-sensitive build metadata — safe to retain.
      - name: Upload build manifest
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.key }}-build
          path: manifests/*.json
          if-no-files-found: warn
          retention-days: 14

      # PACKER_LOG=1 plugin debug traces can carry secrets the console
      # masking never sees (e.g. the interpolated shutdown_command) — and
      # artifacts on a public repo are downloadable by any authenticated
      # GitHub user. Redact every sensitive PKR_VAR_* value before upload,
      # and upload the log only when the build failed (triage-only).
      - name: Scrub secrets from debug log
        id: scrub
        if: failure()
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os, pathlib
          p = pathlib.Path("packer-build.log")
          if p.exists():
              data = p.read_text(errors="replace")
              for k, v in os.environ.items():
                  lk = k.lower()
                  if k.startswith("PKR_VAR_") and v and ("password" in lk or "key" in lk):
                      data = data.replace(v, f"[REDACTED:{k}]")
              p.write_text(data)
              print("scrubbed", p)
          else:
              print("no packer-build.log to scrub")
          PY

      - name: Upload debug log (failures only)
        # Gate on scrub success — if the scrub step itself failed, failure()
        # alone would still upload the RAW (unscrubbed) log.
        if: failure() && steps.scrub.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.key }}-build-debug-log
          path: packer-build.log
          if-no-files-found: warn
          retention-days: 7

  # Unattended failure alerting. The weekly build is the whole point of this
  # pipeline and a red scheduled run is otherwise silent — no reviewer, no PR, so
  # a break can sit unnoticed for weeks (it did: the 2026-06 Windows outage). On
  # a SCHEDULED failure (plan or any build leg), open — or comment on an existing
  # — GitHub issue assigned to the maintainer; the assignment emails them. Manual
  # dispatches are skipped: those are already being watched.
  notify:
    needs: [plan, build]
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: read
    steps:
      - name: Open or update the build-failure issue
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          # The run is still in progress (this job is running), but the build
          # legs have already reported their conclusions.
          failed="$(gh run view "${GITHUB_RUN_ID}" -R "${GITHUB_REPOSITORY}" \
            --json jobs \
            --jq '[.jobs[] | select(.conclusion == "failure") | .name] | join(", ")')"
          [ -n "${failed}" ] || failed="(see run for details)"
          body="The scheduled weekly build-templates run failed.

          Failed legs: ${failed}
          Run: ${RUN_URL}

          Opened automatically; close once the weekly build is green again."
          # Best-effort label so these are filterable; harmless if it exists.
          gh label create ci-failure -R "${GITHUB_REPOSITORY}" \
            --color d73a4a --description "Automated CI failure report" 2>/dev/null || true
          # Dedup by the ci-failure label: comment on the open issue if one is
          # already tracking the outage, else open a fresh one and assign it.
          existing="$(gh issue list -R "${GITHUB_REPOSITORY}" --state open \
            --label ci-failure --json number --jq '.[0].number // empty')"
          if [ -n "${existing}" ]; then
            gh issue comment "${existing}" -R "${GITHUB_REPOSITORY}" --body "${body}"
            echo "Commented on existing issue #${existing}"
          else
            gh issue create -R "${GITHUB_REPOSITORY}" \
              --title "Weekly template build failed" \
              --assignee LukeEvansTech --label ci-failure --body "${body}"
          fi

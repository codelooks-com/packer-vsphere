---
name: build-runner-image
on:
  push:
    branches: [main]
    paths:
      - runner/Dockerfile
      - .mise.toml
      - ansible/**
      - packer.pkr.hcl
      - .github/workflows/build-runner-image.yml
  workflow_dispatch: {}

concurrency:
  group: build-runner-image
  cancel-in-progress: true

permissions:
  contents: read

env:
  # This is the image we BUILD and PUSH (used as ${IMAGE}:latest / ${IMAGE}:date-sha
  # below), not one we pull — it must stay a bare name with no digest. Renovate is
  # told to leave it alone in .renovaterc.json5 (packageRules).
  IMAGE: ghcr.io/codelooks-com/packer-runner

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Log in to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Compute tags
        id: tags
        run: |
          echo "date=$(date -u +%Y%m%d)" >>"$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >>"$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: runner/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.tags.outputs.date }}-${{ steps.tags.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}

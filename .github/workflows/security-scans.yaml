---
name: security-scans

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *" # nightly at 3 AM UTC

# Top-level: read-only by default. The reusable workflow widens per job.
permissions:
  contents: read

jobs:
  scan:
    permissions:
      contents: read
      security-events: write
    uses: LukeEvansTech/shared-workflows/.github/workflows/security-scans.yml@3771e1f9da1b3f6132eec9d63aacc0acb74660bc # v1
    with:
      # Packer/HCL repo: scan the runner Dockerfile and CI workflows, not k8s/helm.
      checkov-frameworks: dockerfile,github_actions

# mise configuration for packer-vsphere project
# https://mise.jdx.dev/
#
# Installation:
#   1. Install mise: https://mise.jdx.dev/getting-started.html
#   2. Run: mise install
#   3. Activate mise in your shell: eval "$(mise activate zsh)"
#      (or add to your ~/.zshrc for permanent activation)
#
# Usage:
#   - mise install          # Install all tools
#   - mise ls               # List installed tools
#   - mise exec -- <cmd>    # Run a command with mise tools in PATH
#
# This manifest is the single source of truth for tool versions; the docs
# (docs/getting-started/requirements.md) point here. It also pins the
# in-cluster runner image (runner/Dockerfile) — keep them in lockstep.

[tools]
packer       = "1.15.4"   # >= 1.15.0 required by builds/
ansible-core = "2.21.1"   # >= 2.16 required by builds/
gomplate     = "5.1.0"    # >= 4.3.0 required for build-ci.tmpl
terraform    = "1.15.8"
# docs require jq >= 1.8.3 but 1.8.1 is the newest in the mise registry;
# no build path depends on the 1.8.2+ fixes.
jq           = "1.8.2"
# CI/runner tooling (used by the in-cluster runner image and smoke tests)
"aqua:vmware/govmomi/govc" = "0.55.1"  # vCenter CLI (mise id is the aqua backend, NOT bare "govc")
goss = "0.4.9"    # post-build smoke assertions
gh   = "2.95.0"   # GitHub CLI: check-iso-updates dispatches upload-isos via gh

# git >= 2.43.0 and xorriso >= 1.5.6 (Linux) come from the system package
# manager / runner image, not mise.

[env]
# Add local bin to PATH for any user-installed tools
_.path = ["$HOME/.local/bin"]
